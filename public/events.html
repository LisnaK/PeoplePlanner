<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Derivco Global Events 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Inter',sans-serif;background:transparent;color:#1a2235;min-height:100vh;padding:0;width:100%;overflow-x:hidden}
.page{max-width:1100px;margin:0 auto;padding:28px 32px 60px}
.page-header{margin-bottom:32px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.page-title{font-size:24px;font-weight:700;color:#ffffff;letter-spacing:0.02em}
.page-sub{font-size:12px;color:rgba(255,255,255,0.7);margin-top:4px}
.legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.7)}
.legend-dot{width:10px;height:10px;border-radius:50%}

.month-section{margin-bottom:36px}
.month-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.month-title{font-size:20px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase}
.add-btn{font-size:11px;font-weight:600;border-radius:20px;padding:4px 14px;cursor:pointer;letter-spacing:0.04em;transition:all 0.15s;border:1px solid;background:transparent}
.add-btn:hover{opacity:0.8}

.cards-container{background:#ffffff;border:1px solid #e2e6ed;border-radius:10px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.cards-grid{display:flex;flex-wrap:wrap;gap:12px}
.event-card{width:180px;min-height:160px;border-radius:10px;padding:14px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;position:relative;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.08)}
.event-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.event-card.tbc{opacity:0.7}
.card-date{font-size:28px;font-weight:800;color:#fff;line-height:1;margin-bottom:2px}
.card-date-sub{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:10px}
.card-name{font-size:12px;font-weight:600;color:#fff;line-height:1.4;flex:1}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:0.04em;white-space:nowrap}
.tag-loc{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7)}
.tag-gg{background:#ffffff;color:#0f172a;border:none;font-size:11px;font-weight:800;padding:4px 12px;letter-spacing:0.04em}
.card-del{position:absolute;top:8px;right:8px;background:none;border:none;color:rgba(0,0,0,0.2);cursor:pointer;font-size:14px;opacity:0;transition:opacity 0.15s;padding:2px 5px;border-radius:4px;line-height:1}
.event-card:hover .card-del{opacity:1}
.card-del:hover{color:#ef4444;background:rgba(239,68,68,0.15)}
.tbc-label{font-size:11px;font-weight:700;letter-spacing:0.1em;color:rgba(255,255,255,0.5);text-transform:uppercase;margin-bottom:10px}
.empty-month{font-size:12px;color:rgba(255,255,255,0.5);font-style:italic;padding:8px 0}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#ffffff;border:1px solid #e2e6ed;border-radius:10px;padding:28px;width:420px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.modal-title{font-size:15px;font-weight:700;color:#0D2147;margin-bottom:20px}
.form-row{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#6b7a99;margin-bottom:5px;display:block}
.form-input{width:100%;background:#f4f6f9;border:1px solid #e2e6ed;border-radius:5px;padding:8px 10px;color:#1a2235;font-size:13px;font-family:inherit;outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:#0D2147;outline:none}
.form-row-half{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.checkbox-row{display:flex;align-items:center;gap:8px;cursor:pointer}
.checkbox-row input{width:15px;height:15px;accent-color:#2dd4d4;cursor:pointer}
.checkbox-label{font-size:13px;color:#1a2235}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn-save{background:#2dd4d4;color:#0f1e3a;border:none;border-radius:5px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer}
.btn-save:hover{background:#22b8b8}
.btn-cancel{background:none;color:#6b7a99;border:1px solid #e2e6ed;border-radius:5px;padding:8px 16px;font-size:13px;cursor:pointer}
.tbc-toggle{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tbc-toggle input{accent-color:#2dd4d4}
.tbc-toggle label{font-size:12px;color:#6b7a99;cursor:pointer}
select.form-input option{background:#ffffff}
.version{position:fixed;bottom:12px;right:16px;font-size:11px;font-weight:600;color:rgba(0,0,0,0.2);pointer-events:none}

#aurora-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.page{position:relative;z-index:1}
.modal-overlay{z-index:1000}
</style>
</head>
<body>
<canvas id="aurora-bg"></canvas>
<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Derivco Global Events & Initiatives 2026</div>
      <div class="page-sub">Click any event to edit</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#2dd4d4"></div> GG Aligned</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.3)"></div> TBC date</div>
      </div>
    </div>
  </div>
  <div id="eventsContainer"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add Event</div>
    <div class="form-row">
      <label class="form-label">Event Name</label>
      <input class="form-input" id="inp-name" placeholder="Event name" />
    </div>
    <div class="form-row">
      <div class="tbc-toggle">
        <input type="checkbox" id="inp-tbc" onchange="toggleDateInput()">
        <label for="inp-tbc">Date TBC</label>
      </div>
      <div id="date-fields" class="form-row-half">
        <div>
          <label class="form-label">Day</label>
          <input class="form-input" id="inp-day" type="number" min="1" max="31" placeholder="e.g. 25" />
        </div>
        <div>
          <label class="form-label">Month</label>
          <select class="form-input" id="inp-month">
            <option value="5">May</option><option value="6">June</option><option value="7">July</option>
            <option value="8">August</option><option value="9">September</option><option value="10">October</option>
            <option value="11">November</option><option value="12">December</option>
          </select>
        </div>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Location(s)</label>
      <input class="form-input" id="inp-location" placeholder="e.g. CPT / DBN / PTA" />
    </div>
    <div class="form-row">
      <label class="checkbox-row">
        <input type="checkbox" id="inp-gg"> <span class="checkbox-label">GG Aligned event</span>
      </label>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEvent()">Save</button>
    </div>
  </div>
</div>

<div class="version">v1.4</div>

<script>
const MONTHS = [
  {num:5,label:'May'},{num:6,label:'June'},{num:7,label:'July'},{num:8,label:'August'},
  {num:9,label:'September'},{num:10,label:'October'},{num:11,label:'November'},{num:12,label:'December'}
];
const MONTH_SHORT = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_COLORS = {
  5:'#2dd4d4', 6:'#0ea5e9', 7:'#38bdf8', 8:'#6366f1',
  9:'#06b6d4', 10:'#0891b2', 11:'#14b8a6', 12:'#1d4ed8'
};

const SEED_EVENTS = [
  {id:'e1',month:5,day:21,tbc:false,name:'AI Hackathon (Dev & IT Ops)',location:'',gg:false},
  {id:'e2',month:5,day:28,tbc:false,name:'AI Hackathon Prize Giving (Dev & IT Ops) & refreshments',location:'',gg:false},
  {id:'e3',month:6,day:4,tbc:false,name:'AI Hackathon (Business & Leadership)',location:'',gg:false},
  {id:'e4',month:6,day:null,tbc:true,name:'AI Hackathon Prize Giving (Business & Leadership) & sweet treats',location:'',gg:false},
  {id:'e5',month:6,day:7,tbc:false,name:'Family Day',location:'DBN - Fig Tree / Hillcrest',gg:true},
  {id:'e6',month:6,day:5,tbc:false,name:'TT Day',location:'IOM',gg:true},
  {id:'e7',month:6,day:null,tbc:true,name:'FIFA WC Sweepstakes',location:'',gg:false},
  {id:'e8',month:6,day:null,tbc:true,name:'Financial Awareness Drive',location:'',gg:true},
  {id:'e9',month:7,day:10,tbc:false,name:'Mandela Stacking Kindness Drive',location:'IOM/DBN/PTA',gg:true},
  {id:'e10',month:7,day:17,tbc:false,name:'Mandela Stacking Kindness Drive',location:'CPT',gg:false},
  {id:'e11',month:7,day:null,tbc:true,name:'Summer Party',location:'IOM/UK',gg:true},
  {id:'e12',month:8,day:null,tbc:true,name:'LeadHERship Initiative',location:'',gg:true},
  {id:'e13',month:8,day:null,tbc:true,name:'Family Day',location:'PTA',gg:false},
  {id:'e14',month:9,day:25,tbc:false,name:'Heritage Day Braai & Refreshments',location:'CPT/DBN/PTA',gg:false},
  {id:'e15',month:9,day:25,tbc:false,name:'Oktoberfest',location:'IOM',gg:true},
  {id:'e16',month:9,day:null,tbc:true,name:'Onsite Benefits Providers & Consultations',location:'',gg:true},
  {id:'e17',month:10,day:null,tbc:true,name:'Quiz Event (Mental Health & Fitness Month)',location:'',gg:false},
  {id:'e18',month:10,day:30,tbc:false,name:'Halloween No Tricks Just Treats!',location:'',gg:false},
  {id:'e19',month:10,day:null,tbc:true,name:'Family Day',location:'CPT',gg:false},
  {id:'e20',month:11,day:null,tbc:true,name:"Men's & Women's Health Checks & Wellness / Movember",location:'',gg:true},
  {id:'e21',month:11,day:null,tbc:true,name:'Year End Function',location:'CPT',gg:false},
  {id:'e22',month:11,day:null,tbc:true,name:'Year End Function',location:'PTA',gg:false},
  {id:'e23',month:12,day:null,tbc:true,name:'Year End Function',location:'DBN',gg:false},
  {id:'e24',month:12,day:18,tbc:false,name:'Year End Function',location:'IOM',gg:false},
  {id:'e25',month:12,day:null,tbc:false,name:"Andrew's Wrap Up Speech",location:'',gg:false},
  {id:'e26',month:12,day:null,tbc:true,name:'Derivkids Christmas',location:'',gg:true},
  {id:'e27',month:12,day:null,tbc:true,name:'Christmas Food Hamper Drive',location:'',gg:false}
];

let events = [];
let editingId = null;

async function loadEvents() {
  try {
    const res = await fetch('/api/state');
    const data = await res.json();
    events = (data.globalEvents && data.globalEvents.length > 0) ? data.globalEvents : JSON.parse(JSON.stringify(SEED_EVENTS));
    if (!data.globalEvents || !data.globalEvents.length) await saveToAPI();
  } catch(e) { events = JSON.parse(JSON.stringify(SEED_EVENTS)); }
  render();
}

async function saveToAPI() {
  try {
    const res = await fetch('/api/state');
    const data = await res.json();
    data.globalEvents = events;
    await fetch('/api/state',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  } catch(e) {}
}

function darken(hex, pct) {
  const n = parseInt(hex.slice(1),16);
  const r = Math.max(0,((n>>16)&0xff) - pct);
  const g = Math.max(0,((n>>8)&0xff) - pct);
  const b = Math.max(0,(n&0xff) - pct);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function render() {
  const container = document.getElementById('eventsContainer');
  container.innerHTML = MONTHS.map(m => {
    const color = MONTH_COLORS[m.num];
    const monthEvents = events.filter(e=>e.month===m.num).sort((a,b)=>(a.tbc?99:a.day||0)-(b.tbc?99:b.day||0));
    return `
      <div class="month-section">
        <div class="month-header">
          <div class="month-title" style="color:${color}">${m.label}</div>
          <button class="add-btn" style="color:${color};border-color:${color}40;" onclick="openAdd(${m.num})">+ Add event</button>
        </div>
        ${monthEvents.length===0
          ? '<div class="empty-month">No events yet</div>'
          : `<div class="cards-container"><div class="cards-grid">${monthEvents.map(e=>{
                const bg = `linear-gradient(135deg,${darken(color,50)} 0%,${darken(color,70)} 100%)`;
                return `<div class="event-card${e.tbc?' tbc':''}" style="background:${bg};border-color:${color}40;" onclick="openEdit('${e.id}')">
                  <button class="card-del" onclick="event.stopPropagation();deleteEvent('${e.id}')">×</button>
                  <div>
                    ${e.tbc
                      ? `<div class="tbc-label">TBC</div>`
                      : `<div class="card-date" style="color:${color}">${e.day}</div><div class="card-date-sub">${MONTH_SHORT[e.month]}</div>`
                    }
                    <div class="card-name">${escHtml(e.name)}</div>
                  </div>
                  <div class="card-tags">
                    ${e.location?`<span class="tag tag-loc">${escHtml(e.location)}</span>`:''}
                    ${e.gg?`<span class="tag tag-gg">★ GG Aligned</span>`:''}
                  </div>
                </div>`;
              }).join('')}</div></div>`}
      </div>`;
  }).join('');
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function openAdd(month) {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add Event';
  document.getElementById('inp-name').value='';
  document.getElementById('inp-tbc').checked=false;
  document.getElementById('inp-day').value='';
  document.getElementById('inp-month').value=month;
  document.getElementById('inp-location').value='';
  document.getElementById('inp-gg').checked=false;
  document.getElementById('date-fields').style.display='grid';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('inp-name').focus(),50);
}

function openEdit(id) {
  const e = events.find(ev=>ev.id===id);
  if (!e) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Event';
  document.getElementById('inp-name').value=e.name;
  document.getElementById('inp-tbc').checked=e.tbc;
  document.getElementById('inp-day').value=e.day||'';
  document.getElementById('inp-month').value=e.month;
  document.getElementById('inp-location').value=e.location||'';
  document.getElementById('inp-gg').checked=e.gg||false;
  document.getElementById('date-fields').style.display=e.tbc?'none':'grid';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('inp-name').focus(),50);
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');editingId=null;}
function toggleDateInput(){document.getElementById('date-fields').style.display=document.getElementById('inp-tbc').checked?'none':'grid';}

function saveEvent() {
  const name=document.getElementById('inp-name').value.trim();
  if(!name){document.getElementById('inp-name').focus();return;}
  const tbc=document.getElementById('inp-tbc').checked;
  const day=tbc?null:(parseInt(document.getElementById('inp-day').value)||null);
  const month=parseInt(document.getElementById('inp-month').value);
  const location=document.getElementById('inp-location').value.trim();
  const gg=document.getElementById('inp-gg').checked;
  if(editingId){const e=events.find(ev=>ev.id===editingId);if(e){e.name=name;e.tbc=tbc;e.day=day;e.month=month;e.location=location;e.gg=gg;}}
  else{events.push({id:'e'+Date.now(),month,day,tbc,name,location,gg});}
  saveToAPI();render();closeModal();
}

function deleteEvent(id){if(!confirm('Delete this event?'))return;events=events.filter(e=>e.id!==id);saveToAPI();render();}

document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
loadEvents();
</script>

<script>
(function(){
  const c=document.getElementById('aurora-bg');
  const ctx=c.getContext('2d');
  let W,H,mx=0.5,my=0.5,t=0,clicks=[];
  const scale=3;
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  window.addEventListener('mousemove',e=>{mx=e.clientX/window.innerWidth;my=e.clientY/window.innerHeight;});
  window.addEventListener('click',e=>{clicks.push({x:e.clientX,y:e.clientY,t:0});});
  function draw(){
    t+=0.012;
    clicks=clicks.filter(c=>{c.t++;return c.t<70;});
    const sw=Math.ceil(W/scale), sh=Math.ceil(H/scale);
    const id=ctx.createImageData(sw,sh);
    const d=id.data;
    for(let x=0;x<sw;x++){for(let y=0;y<sh;y++){
      const i=(y*sw+x)*4;
      const nx=x/sw, ny=y/sh;
      const w1=Math.sin(nx*4+t*0.5+my*3)*0.5+0.5;
      const w2=Math.sin(nx*6-t*0.3+mx*4)*0.5+0.5;
      const w3=Math.sin(ny*5+t*0.4+mx*2)*0.5+0.5;
      const mix=w1*w2*w3;
      d[i]=Math.floor(4+mix*20);
      d[i+1]=Math.floor(80+mix*120+w2*60);
      d[i+2]=Math.floor(120+mix*100+w1*80);
      d[i+3]=255;
    }}
    const tmp=document.createElement('canvas');
    tmp.width=sw;tmp.height=sh;
    tmp.getContext('2d').putImageData(id,0,0);
    ctx.imageSmoothingEnabled=true;
    ctx.drawImage(tmp,0,0,W,H);
    clicks.forEach(cl=>{
      const g=ctx.createRadialGradient(cl.x,cl.y,0,cl.x,cl.y,120*(1-cl.t/70));
      g.addColorStop(0,`rgba(255,255,255,${0.35*(1-cl.t/70)})`);
      g.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    });
    requestAnimationFrame(draw);
  }
  resize();
  window.addEventListener('resize',resize);
  draw();
})();
</script>
</body>
</html>
